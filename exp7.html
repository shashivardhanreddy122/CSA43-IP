<!DOCTYPE html>
<html>
<head>
    <title>Number Divisible by 99</title>
</head>
<body>

<script>
let num = 1001;

while(true)
{
    if(num % 99 == 0)
    {
        document.write("First number greater than 1000 divisible by 99 is: " + num);
        break;
    }
    num++;
}
</script>

</body>
</html>
